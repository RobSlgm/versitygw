{{- if and .Values.webui.enabled .Values.webui.httpRoute.enabled -}}
{{- $fullName := include "versitygw.fullname" . -}}
{{- $svcPort := .Values.webui.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-webui
  labels:
    {{- include "versitygw.labels" . | nindent 4 }}
  {{- with .Values.webui.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- with .Values.webui.httpRoute.parentRefs }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.webui.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.webui.httpRoute.rules }}
    {{- with .matches }}
    - matches:
      {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .filters }}
      filters:
      {{- toYaml . | nindent 8 }}
    {{- end }}
      backendRefs:
        - name: {{ $fullName }}-webui
          port: {{ $svcPort }}
          weight: 1
    {{- end }}
{{- end }}
